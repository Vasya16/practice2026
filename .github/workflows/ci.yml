name: .NET Core CI
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v4
        
        - name: Setup .NET Core
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: '10.0.x'
        
        - name: Restore dependencies
          run: dotnet restore practice2026.slnx

        - name: Build solution
          run: dotnet build practice2026.slnx --configuration Release --no-restore

        - name: Run tests
          run: dotnet test practice2026.slnx --configuration Release --no-build --verbosity normal